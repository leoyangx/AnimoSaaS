services:

  db:

    image: postgres:15-alpine

    container_name: animosaas-db

    restart: always

    environment:

      POSTGRES_USER: ${POSTGRES_USER:-animosaas}

      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-animosaas_pass}

      POSTGRES_DB: ${POSTGRES_DB:-animosaas_db}

    ports:

      - "127.0.0.1:5432:5432"

    volumes:

      - postgres_data:/var/lib/postgresql/data

    healthcheck:

      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-animosaas} -d ${POSTGRES_DB:-animosaas_db}"]

      interval: 5s

      timeout: 5s

      retries: 5



  app:

    build:

      context: .

      dockerfile: Dockerfile

    container_name: animosaas-app

    restart: always

    ports:

      - "3000:3000"

    environment:

      DATABASE_URL: postgresql://${POSTGRES_USER:-animosaas}:${POSTGRES_PASSWORD:-animosaas_pass}@db:5432/${POSTGRES_DB:-animosaas_db}

      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required. Set it in .env file}

      DISABLE_SECURE_COOKIE: "true" # Set to "false" if you use HTTPS/SSL

    depends_on:

      db:

        condition: service_healthy



volumes:

  postgres_data: