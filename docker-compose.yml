version: '3.9'

services:
  # PostgreSQL 数据库
  db:
    image: postgres:15-alpine
    container_name: animosaas-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: animosaas
      POSTGRES_PASSWORD: ${DB_PASSWORD:-animosaas_pass}
      POSTGRES_DB: animosaas_db
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=C"
      TZ: Asia/Shanghai
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U animosaas -d animosaas_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - animosaas-network

  # Next.js 应用
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NODE_ENV=production
    container_name: animosaas-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # 数据库连接
      DATABASE_URL: postgresql://animosaas:${DB_PASSWORD:-animosaas_pass}@db:5432/animosaas_db

      # JWT 密钥（必须修改）
      JWT_SECRET: ${JWT_SECRET}

      # 管理员密码（必须修改）
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}

      # Node 环境
      NODE_ENV: production

      # Cookie 安全（生产环境必须为 false）
      DISABLE_SECURE_COOKIE: ${DISABLE_SECURE_COOKIE:-false}

      # 应用配置
      APP_URL: ${APP_URL:-http://localhost:3000}
      PORT: 3000
      HOSTNAME: 0.0.0.0

      # 时区
      TZ: Asia/Shanghai

      # 日志级别
      LOG_LEVEL: ${LOG_LEVEL:-info}

      # Prisma
      PRISMA_QUERY_ENGINE_LIBRARY: /app/node_modules/.prisma/client/libquery_engine-debian-openssl-3.0.x.so.node
    volumes:
      - ./public/uploads:/app/public/uploads
      - ./logs:/app/logs
      - app_data:/app/.next/cache
    ports:
      - "${APP_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - animosaas-network

volumes:
  postgres_data:
    driver: local
  app_data:
    driver: local

networks:
  animosaas-network:
    driver: bridge