name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# 全局占位环境变量，确保所有 job 中 Next.js 模块加载不会因缺少变量而崩溃
env:
  JWT_SECRET: ci-placeholder-jwt-secret-at-least-32-characters-long
  DATABASE_URL: postgresql://ci:ci@localhost:5432/ci_placeholder
  TENANT_MODE: path

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 安装依赖
        run: npm ci

      - name: 生成 Prisma Client
        run: npx prisma generate

      - name: ESLint 检查
        run: npm run lint

      - name: TypeScript 类型检查
        run: npm run type-check

      - name: Prettier 格式检查
        run: npm run format:check

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 安装依赖
        run: npm ci

      - name: 生成 Prisma Client
        run: npx prisma generate

      - name: 运行单元测试
        run: npm run test
        env:
          NODE_ENV: test

      - name: 运行覆盖率测试
        run: npm run test:coverage
        env:
          NODE_ENV: test

  build:
    name: Build Check
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 安装依赖
        run: npm ci

      - name: 生成 Prisma Client
        run: npx prisma generate

      - name: 构建 Next.js
        run: npm run build

      - name: 验证 standalone 输出
        run: |
          ls -la .next/standalone/server.js
          echo "Standalone build verified"

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test, build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: 构建 Docker 镜像
        run: |
          docker build -t animosaas:${{ github.sha }} .
          docker build -t animosaas:latest .

      - name: 验证镜像
        run: |
          docker images animosaas
          echo "Docker image built successfully"
